server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;

    # sitemap.xml を正しい Content-Type で返す
    location ~* \.xml$ {
        default_type application/xml;
        add_header Access-Control-Allow-Origin *;
    }

    # HTML ページを配信（クロールテスト用）
    location / {
        index index.html;
        try_files $uri $uri/ =404;
        add_header Access-Control-Allow-Origin *;
    }
}
